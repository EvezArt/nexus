# fly.toml — Fly.io deployment for NEXUS
#
# Deploy:  fly launch --dockerfile nexus/Dockerfile
# Scale:   fly scale count 3
# Secrets: fly secrets set CHATGPT_API_KEY=sk-... PERPLEXITY_API_KEY=pplx-...
# Logs:    fly logs
# SSH:     fly ssh console

app = "nexus-farm"
primary_region = "iad"

[build]
  dockerfile = "nexus/Dockerfile"

[env]
  MORPHEUS_WORKSPACE = "/app"
  NEXUS_INTERVAL = "300"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8877
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

[[services]]
  protocol = "tcp"
  internal_port = 8877

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = 30000
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = 5000

[deploy]
  strategy = "rolling"

[processes]
  nexus = "python3 nexus/nexus_daemon.py --interval 300 --serve --port 8877"
